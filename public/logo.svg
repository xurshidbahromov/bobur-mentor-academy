<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Ultra-premium tech gradient -> deep dark space -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1E2F"/>
      <stop offset="100%" stop-color="#09090E"/>
    </linearGradient>

    <!-- Glossy inner rim reflection -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Logo shadow for depth -->
    <filter id="neon_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="30" flood-color="#4F46E5" flood-opacity="0.15"/>
    </filter>

    <!-- Sigma gradient -> futuristic indigo/white -->
    <linearGradient id="sigmaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
  </defs>

  <!-- iOS-style Squircle background -->
  <rect width="512" height="512" rx="135" ry="135" fill="url(#bg)"/>
  
  <!-- Outer metallic stroke / rim -->
  <rect width="508" height="508" x="2" y="2" rx="135" ry="135" fill="none" stroke="url(#rim)" stroke-width="4"/>

  <!-- Perfect Geometric Sigma -->
  <!-- Thick, rounded stroke for a friendly yet highly premium look -->
  <path
    d="M 350 160 L 170 160 L 260 256 L 170 352 L 350 352"
    fill="none"
    stroke="url(#sigmaGrad)"
    stroke-width="56"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#neon_glow)"
  />
</svg>
