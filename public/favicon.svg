<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3461FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Hexagon background -->
  <polygon
    points="256,28 450,140 450,372 256,484 62,372 62,140"
    fill="url(#bgGrad)"
  />

  <!-- Inner glow layer -->
  <polygon
    points="256,60 418,158 418,354 256,452 94,354 94,158"
    fill="url(#glowGrad)"
  />

  <!-- Subtle inner border -->
  <polygon
    points="256,60 418,158 418,354 256,452 94,354 94,158"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="2"
  />

  <!-- Sigma symbol Σ (centered) -->
  <text
    x="256"
    y="320"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="240"
    font-weight="bold"
    fill="white"
    opacity="0.95"
  >Σ</text>

  <!-- Small decorative dots (math dots) -->
  <circle cx="140" cy="180" r="8" fill="white" opacity="0.3"/>
  <circle cx="372" cy="180" r="8" fill="white" opacity="0.3"/>
  <circle cx="140" cy="332" r="8" fill="white" opacity="0.3"/>
  <circle cx="372" cy="332" r="8" fill="white" opacity="0.3"/>
</svg>