<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7C6FF7"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Top shine -->
  <rect width="512" height="260" rx="110" ry="110" fill="url(#shine)"/>

  <!--
    Sigma (Σ) drawn as TWO clean paths:
    1. C-frame: top bar → left edge → bottom bar
    2. Chevron: two diagonals from right ends meeting at center point
  -->

  <!-- C-frame: top-bar + left edge + bottom-bar -->
  <path
    d="M 348,158 L 166,158 L 166,354 L 348,354"
    fill="none"
    stroke="white"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.93"
  />

  <!-- Chevron: from top-right → center → bottom-right -->
  <path
    d="M 348,158 L 230,256 L 348,354"
    fill="none"
    stroke="white"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.93"
  />
</svg>