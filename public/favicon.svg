<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgMain" cx="50%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#7C5CE8"/>
      <stop offset="55%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#1a1060"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="15%" r="45%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgMain)"/>

  <!-- Glass shine at top -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" ry="112"
    fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Sigma Σ with glow -->
  <text
    x="256" y="340"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="310"
    font-weight="700"
    fill="white"
    opacity="0.95"
    filter="url(#glow)"
  >Σ</text>
</svg>